<!DOCTYPE html>
<html lang="zh">
<head>
    <title>[运放]发波发生器计算</title>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="../css/style.css"/>
    <script type="text/javascript" src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
    <script type="text/javascript" src="script.js"></script>
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            tex2jax: {inlineMath: [['$', '$']]},
            messageStyle: "none"
        });

<body>
    <nav><a href="../index.html"> &lt;- 返回目录</a><h1>[运放]方波发生器参数计算</h1></nav>
    <main>
        $$T = 2R_3C_1\ln\bigg(1 + 2\frac{R_1}{R_2}\bigg)$$
        <div id="result"></div>
        <div class="panel">
            <img src="https://pic3.zhimg.com/v2-4a5474a8ab273554b6fb9f44601dd286_r.jpg">
            <div id="form">
                <p>电容$C_1$[uF]：<input id="c" type="text"/></p>
                <p>电阻$R_3$[kΩ]：<input id="r" type="text"/></p>
                <p>$R_1/R_2$：<input id="k" type="text"/></p>
                <div id="button">
                    <input onclick="confirm()" type="button" value="确定">
                    <input onclick="clearNumber()" type="button" value="清空">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
