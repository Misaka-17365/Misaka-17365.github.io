<!DOCTYPE html>
<html>
<head>
    <title>文氏桥震荡电路参数计算</title>
    <meta charset="utf-8">
    <link rel="stylesheet" type="text/css" href="../css/style.css">
    <script type="text/javascript" src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
    <script type="text/javascript" src="script.js"></script>
    <script type="text/x-mathjax-config">
        MathJax.Hub.Config({
            tex2jax: {inlineMath: [['$', '$']]},
            messageStyle: "none"
        });
    </script>

</head>

<body>
    <nav><a href="../index.html"> &lt;- 返回目录</a><h1>文氏桥震荡电路参数计算</h1></nav>

    <main>
       $$f = \frac{1}{2\pi \sqrt{C_1C_2R_3R_4}}$$
       <div class="ps">为了便于计算，通常使$R_3 = R_4$，$C_1 = C_2$</div>
       $$f = \frac{1}{2\pi C_1R_3}$$

        <div id="result"></div>
        <div class="ps" >为了成功起振并且不失真，需保证$R_2 > 2R_1 $且$ R_2 \parallel R_5 < 2R_1$</div>
        <div class="panel">
            <img src="https://pic2.zhimg.com/v2-18ae18a357f71c66dba926b571543135_r.jpg"/>
            <div id="form">
                <p>电容$C_1$[uF]：<input id="c" type="text"/></p>
                <p>电阻$R_3$[kΩ]：<input id="r" type="text"/></p>
                <div id="button">
                    <input onclick="confirm()" type="button" value="确定">
                    <input onclick="clearNumber()" type="button" value="清空">
                </div>
            </div>

        </div>
    </main>
</body>
</html>
