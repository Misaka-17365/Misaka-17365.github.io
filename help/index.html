<!DOCTYPE html>
<html lang="zh">

<head>
    <title>网页发布流程</title>
    <link href="style.css" type="text/css" rel="stylesheet" />
</head>
<body>
    <h1>网页发表流程</h1>
    <h2>1、保存所有文档</h3>
    <img src="save.png" />
    <p>保证所有文件都变成×</p>

    <h2>2、打开GitKraken</h2>
    <p>应该会出现以下画面</p>
    <img src="open.png" />
    <p>依次点击按钮，输入内容</p>
    <img src="submit.png" />

    <h2>3、将文件提交到远程服务器</h2>
    <p>点击Push按钮，等待完成提示</p>
    <img src="complete.png" />
    <p>出现蓝色方框，表示成功推送，未成功多次尝试</p>

</body>
</html>
